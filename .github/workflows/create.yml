name: Create SDK

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform: ios, ipados, tvos, watchos, macos, or visionos'
        required: true
        type: string
        default: 'ios'
      ipsw_device:
        description: 'The device ID to download the IPSW for, e.g. "iPhone11,2", "AppleTV14,1", "Mac14,7"'
        required: true
        type: string
      ipsw_version:
        description: 'The version to download the IPSW for, e.g. "16.5"'
        required: true
        type: string
      dsc_basename:
        description: 'The basename for the dyld_shared_cache in the IPSW'
        required: true
        type: string
        default: 'dyld_shared_cache_arm64e'
      xcode_version:
        description: 'Xcode version, e.g. "14.4". Primarily used for the base SDK'
        required: true
        type: string
      xcrun_sdk_name:
        description: 'The value to pass to "xcrun --sdk", e.g. "iphoneos", "appletvos", "watchos", "macosx", "xros"'
        required: true
        type: string
        default: 'iphoneos'
      full_sdk_name:
        description: 'The full name of the output SDK, e.g. "iPhoneOS16.5"'
        required: true
        type: string
      runner_label:
        description: 'Runner label to use, e.g. "macos-26", "macos-26-xlarge", "xcode-27"'
        required: true
        type: string
        default: 'macos-26'

jobs:
  create:
    runs-on: ${{ inputs.runner_label }}
    permissions:
      contents: write

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Clone tbd
        uses: actions/checkout@v4
        with:
          repository: leptos-null/tbd
          ref: f0ae164d76b7bb802bbdf8ef758cc5637fac0fa1
          path: tbd

      - name: Build tbd
        run: |
          cd tbd
          make bin/tbd

      - name: Trust blacktop/ipsw
        run: brew trust blacktop/tap

      - name: Install blacktop/ipsw
        run: brew install blacktop/tap/ipsw

      - name: Install aria2
        run: brew install aria2

      - name: Patch SDK
        id: patch-sdk
        env:
          DEVELOPER_DIR: /Applications/Xcode_${{ inputs.xcode_version }}.app
        run: |
          TBD_TOOL_PATH="$(pwd)/tbd/bin/tbd"
          SDK_OUTPUT_PATH="$(pwd)/${{ inputs.full_sdk_name }}.sdk"

          DSC_BASENAME="${{ inputs.dsc_basename }}"
          XC_SDK_NAME="${{ inputs.xcrun_sdk_name }}"
          IPSW_VERSION="${{ inputs.ipsw_version }}"
          IPSW_DEVICE="${{ inputs.ipsw_device }}"
          PLATFORM="${{ inputs.platform }}"
          IPSW_MAJOR="${IPSW_VERSION%%.*}"
          DSC_ARCH="${DSC_BASENAME#dyld_shared_cache_}"

          cd tools/
          PLATFORM_PATH="$(xcrun --sdk "${XC_SDK_NAME}" --show-sdk-platform-path)"
          BASE_SDK_PATH="$(xcrun --sdk "${XC_SDK_NAME}" --show-sdk-path)"

          IPSW_DOWNLOAD_DIR="$(mktemp -d -t ipsw)"
          DYLD_EXTRACT_DIR="$(mktemp -d -t dyld)"

          # ipsw.me's --macos flag is required to disambiguate Mac restores;
          # other platforms resolve fine from the device identifier alone.
          IPSW_EXTRA_FLAGS=()
          if [ "${PLATFORM}" = "macos" ]; then
            IPSW_EXTRA_FLAGS+=(--macos)
          fi

          set +e
          IPSW_DOWNLOAD_URL="$(ipsw download ipsw --urls --version "${IPSW_VERSION}" --device "${IPSW_DEVICE}" "${IPSW_EXTRA_FLAGS[@]}")"
          IPSW_EXIT=$?
          set -e

          if [ ${IPSW_EXIT} -ne 0 ] || [ -z "${IPSW_DOWNLOAD_URL}" ]; then
            echo "ipsw.me lookup failed for ${IPSW_DEVICE} / ${IPSW_VERSION} (exit ${IPSW_EXIT})."

            # ipswbeta.dev path prefixes: ios, ipados, tvos, macos, visionos.
            # watchOS is not covered by ipswbeta.dev at all -- fail clearly instead
            # of guessing at a URL that doesn't exist.
            case "${PLATFORM}" in
              ios|ipados|tvos|macos|visionos)
                IPSWBETA_PREFIX="${PLATFORM}"
                ;;
              watchos)
                echo "watchOS has no ipswbeta.dev fallback available. Aborting."
                exit 1
                ;;
              *)
                echo "Unrecognized platform '${PLATFORM}' for ipswbeta.dev fallback. Aborting."
                exit 1
                ;;
            esac

            echo "Falling back to ipswbeta.dev for the latest ${IPSW_MAJOR}.x beta build..."

            IPSWBETA_URL="https://ipswbeta.dev/${IPSWBETA_PREFIX}/${IPSW_MAJOR}.x/${IPSW_DEVICE}"
            IPSW_DOWNLOAD_URL="$(curl -fsSL "${IPSWBETA_URL}" \
              | grep -oE 'https://updates\.cdn-apple\.com[^"]*\.ipsw' \
              | head -n1)"

            if [ -z "${IPSW_DOWNLOAD_URL}" ]; then
              echo "Failed to resolve any IPSW URL from ${IPSWBETA_URL}"
              exit 1
            fi

            echo "Resolved via ipswbeta.dev: ${IPSW_DOWNLOAD_URL}"
          else
            echo "Resolved via ipsw.me: ${IPSW_DOWNLOAD_URL}"
          fi

          echo "Downloading ${IPSW_DOWNLOAD_URL}"
          aria2c --dir "${IPSW_DOWNLOAD_DIR}" "${IPSW_DOWNLOAD_URL}"

          IPSW_FILE="$(find "${IPSW_DOWNLOAD_DIR}" -name '*.ipsw' | head -n1)"

          ipsw extract --dyld --dyld-arch "${DSC_ARCH}" --flat --output "${DYLD_EXTRACT_DIR}" "${IPSW_FILE}"

          DYLD_CACHE_PATH="$(find "${DYLD_EXTRACT_DIR}" -name "${DSC_BASENAME}" | head -n1)"

          echo "Found dyld_shared_cache: ${DYLD_CACHE_PATH}"

          if [ -z "${DYLD_CACHE_PATH}" ]; then
            echo "Failed to find ${DSC_BASENAME} in IPSW"
            exit 1
          fi

          chmod +x ./create_patched_sdk_image.sh
          ./create_patched_sdk_image.sh "${DYLD_CACHE_PATH}" "${SDK_OUTPUT_PATH}" "${BASE_SDK_PATH}" "${PLATFORM_PATH}" "${TBD_TOOL_PATH}"

          echo "sdk-path=${SDK_OUTPUT_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          SDK_NAME="${{ inputs.full_sdk_name }}"
          BRANCH_NAME="bot/${SDK_NAME}"

          git switch -c "${BRANCH_NAME}"
          git add "${{ steps.patch-sdk.outputs.sdk-path }}"

          git commit -m "Add ${SDK_NAME} SDK"
          git push --set-upstream origin "${BRANCH_NAME}"
